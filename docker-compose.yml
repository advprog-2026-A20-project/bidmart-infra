name: bidmart-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  listing-query-service:
    build:
      context: ../bidmart-listing-query-service
    restart: unless-stopped
    ports:
      - "${LISTING_QUERY_SERVICE_PORT}:8082"
    environment:
      PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  auction-query-service:
    build:
      context: ../bidmart-auction-query-service
    restart: unless-stopped
    ports:
      - "${AUCTION_QUERY_SERVICE_PORT}:8083"
    environment:
      PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ../bidmart-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      WALLET_SERVICE_BASE_URL: http://wallet-service:8085
      BIDDING_COMMAND_SERVICE_BASE_URL: http://bidding-command-service:8084
      AUCTION_QUERY_SERVICE_ENABLED: "true"
      AUCTION_QUERY_SERVICE_BASE_URL: http://auction-query-service:8083
      AUCTION_QUERY_SERVICE_ROLLOUT_MODE: FULL
      AUCTION_QUERY_SERVICE_FAIL_OPEN: "true"
      LISTING_QUERY_SERVICE_ENABLED: "true"
      LISTING_QUERY_SERVICE_BASE_URL: http://listing-query-service:8082
      LISTING_QUERY_SERVICE_ROLLOUT_MODE: FULL
      LISTING_QUERY_SERVICE_FAIL_OPEN: "true"
    depends_on:
      postgres:
        condition: service_healthy
      listing-query-service:
        condition: service_started
      auction-query-service:
        condition: service_started
      bidding-command-service:
        condition: service_started

  auth-service:
    build:
      context: ../bidmart-auth-service
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT}:8081"
    environment:
      PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      WALLET_SERVICE_BASE_URL: http://wallet-service:8085

  bidding-command-service:
    build:
      context: ../bidmart-bidding-command-service
    restart: unless-stopped
    ports:
      - "${BIDDING_COMMAND_SERVICE_PORT}:8084"
    environment:
      PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      WALLET_SERVICE_BASE_URL: http://wallet-service:8085
    depends_on:
      postgres:
        condition: service_healthy
      wallet-service:
        condition: service_started

  wallet-service:
    build:
      context: ../bidmart-wallet-service
    restart: unless-stopped
    ports:
      - "${WALLET_SERVICE_PORT}:8085"
    environment:
      PORT: 8085

  notification-service:
    build:
      context: ../bidmart-notification-service
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8086"
    environment:
      PORT: 8086
    profiles: ["optional"]

  frontend:
    build:
      context: ../bidmart-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - gateway
