services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bidmart}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bidmart}"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ../bidmart-gateway
    environment:
      PORT: ${GATEWAY_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bidmart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-please-change-32-chars}
      AUCTION_QUERY_SERVICE_ENABLED: "true"
      AUCTION_QUERY_SERVICE_BASE_URL: http://auction-query-service:8081
      AUCTION_QUERY_SERVICE_ROLLOUT_MODE: FULL
      AUCTION_QUERY_SERVICE_FAIL_OPEN: "true"
      LISTING_QUERY_SERVICE_ENABLED: "true"
      LISTING_QUERY_SERVICE_BASE_URL: http://listing-query-service:8082
      LISTING_QUERY_SERVICE_ROLLOUT_MODE: FULL
      LISTING_QUERY_SERVICE_FAIL_OPEN: "true"
    depends_on:
      postgres:
        condition: service_healthy
      auction-query-service:
        condition: service_started
      listing-query-service:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  auction-query-service:
    build:
      context: ../bidmart-auction-query-service
    environment:
      PORT: 8081
      AUCTION_QUERY_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bidmart}
      AUCTION_QUERY_DB_USERNAME: ${POSTGRES_USER:-postgres}
      AUCTION_QUERY_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${AUCTION_QUERY_PORT:-8081}:8081"

  listing-query-service:
    build:
      context: ../bidmart-listing-query-service
    environment:
      PORT: 8082
      LISTING_QUERY_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bidmart}
      LISTING_QUERY_DB_USERNAME: ${POSTGRES_USER:-postgres}
      LISTING_QUERY_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LISTING_QUERY_PORT:-8082}:8082"

  auth-service:
    build:
      context: ../bidmart-auth-service
    environment:
      PORT: 8083
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-please-change-32-chars}
    profiles: ["future-command"]
    ports:
      - "${AUTH_PORT:-8083}:8083"

  wallet-service:
    build:
      context: ../bidmart-wallet-service
    environment:
      PORT: 8084
    profiles: ["future-command"]
    ports:
      - "${WALLET_PORT:-8084}:8084"

  bidding-command-service:
    build:
      context: ../bidmart-bidding-command-service
    environment:
      PORT: 8085
      WALLET_SERVICE_BASE_URL: http://wallet-service:8084
      AUTH_SERVICE_BASE_URL: http://auth-service:8083
      LISTING_SERVICE_BASE_URL: http://gateway:8080
    profiles: ["future-command"]
    ports:
      - "${BIDDING_COMMAND_PORT:-8085}:8085"

  notification-service:
    build:
      context: ../bidmart-notification-service
    environment:
      PORT: 8086
    profiles: ["future-command"]
    ports:
      - "${NOTIFICATION_PORT:-8086}:8086"

  frontend:
    build:
      context: ../bidmart-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${GATEWAY_PORT:-8080}/api
    profiles: ["frontend"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
